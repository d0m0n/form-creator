name: Deploy to Sakura

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SAKURA_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SAKURA_HOST }} >> ~/.ssh/known_hosts

      - name: Upload built assets
        run: |
          rsync -az --delete \
            public/build/ \
            ${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}:~/form-creator/public/build/

      - name: Deploy on server
        run: |
          ssh ${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }} << 'ENDSSH'
            set -e
            cd ~/form-creator

            git pull origin main

            composer install --optimize-autoloader --no-dev --quiet

            php artisan migrate --force

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "✅ Deploy complete"
          ENDSSH
